name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: |
            hub/requirements.txt
            display/requirements.txt

      - name: Create virtual environments
        run: |
          python -m venv hub/venv
          python -m venv display/venv
          hub/venv/bin/python -m pip install --upgrade pip
          display/venv/bin/python -m pip install --upgrade pip
          hub/venv/bin/python -m pip install -r hub/requirements.txt

      - name: Run repository audit
        run: ./scripts/repo-audit.sh

      - name: Run tests and compile checks
        run: ./scripts/run-tests.sh

      - name: Verify release tools compile
        run: python -m py_compile release/*.py
