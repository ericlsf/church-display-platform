name: Feature request
description: Propose a focused enhancement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the operational or content-management problem, not only the desired UI.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Content and playlists
        - Hub operations
        - Display playback
        - Deployment and releases
        - Scheduling
        - Security
        - Fleet management
        - Other
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the observable conditions that would make the feature complete.
