<!doctype html>
<html>
<head>
    <title>{% block title %}Church Display Hub{% endblock %}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Church Display Hub</h1>
        <nav>
            <a class="{{ 'active' if active == 'dashboard' else '' }}" href="/">Dashboard</a>
            <a class="{{ 'active' if active == 'displays' else '' }}" href="/displays">Displays</a>
            <a class="{{ 'active' if active == 'discovery' else '' }}" href="/discovery">Discovery</a>
            <a class="{{ 'active' if active == 'health' else '' }}" href="/health">Health</a>
            <a class="{{ 'active' if active == 'content' else '' }}" href="/content">Content</a>
            <a class="{{ 'active' if active == 'media' else '' }}" href="/media">Media</a>
            <a class="{{ 'active' if active == 'schedules' else '' }}" href="/schedules">Schedules</a>
            <a class="{{ 'active' if active == 'jobs' else '' }}" href="/jobs">Jobs</a>
            <a class="{{ 'active' if active == 'deployments' else '' }}" href="/deployments">Deployments</a>
            <a class="{{ 'active' if active == 'releases' else '' }}" href="/releases">Releases</a>
            <a class="{{ 'active' if active == 'setup' else '' }}" href="/setup">Setup</a>
            <a class="{{ 'active' if active == 'system' else '' }}" href="/system">System</a>
        {% if current_user and current_user.role == 'admin' %}<a class="{{ 'active' if active == 'users' else '' }}" href="/users">Users</a><a class="{{ 'active' if active == 'audit' else '' }}" href="/audit">Audit</a>{% endif %}
            <a class="{{ 'active' if active == 'operations' else '' }}" href="/operations">Operations</a>
            <a class="{{ 'active' if active == 'groups' else '' }}" href="/groups">Groups</a>
</nav>
    </header>
    <main>{% block content %}{% endblock %}</main>
{% if current_user %}<form method="POST" action="/logout" style="position:fixed;right:16px;top:12px;z-index:1000;"><button type="submit">Sign Out</button></form>{% endif %}
</body>
</html>
